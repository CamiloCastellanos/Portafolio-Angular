<div class="mt-3">
  <a
    class="button is-ghost is-inverted is-medium ml-3"
    (click)="changeLanguage('es')"
  >
    <figure class="icon languages">
      <img
        src="assets/image/languages/es.svg "
        alt="Idioma Español - Spanish language "
      />
    </figure>
  </a>
  <a
    class="button is-ghost is-inverted is-medium ml-3"
    (click)="changeLanguage('en')"
  >
    <figure class="icon languages">
      <img
        src="assets/image/languages/en.svg "
        alt="Idioma Ingles - English language "
      />
    </figure>
  </a>
  <app-switch-theme
    [widthButton]="'52px'"
    [heightButton]="'52px'"
    class="ml-3"
  ></app-switch-theme>
</div>
<div class="navbar-mobile">
  <div class="menu" #menu>
    <button
      class="menu-item menu-text typography-open-sans font-weight-700"
      routerLink="/home"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      {{ "HOME_NAVBAR" | translate }}
    </button>

    <button
      class="menu-item menu-text typography-open-sans font-weight-700"
      routerLink="/perfil"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      {{ "PERFIL_NAVBAR" | translate }}
    </button>

    <button
      class="menu-item menu-text typography-open-sans font-weight-700"
      routerLink="/trabajos"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      {{ "TRABAJOS_NAVBAR" | translate }}
    </button>

    <button
      class="menu-item menu-text typography-open-sans font-weight-700"
      routerLink="/proyectosPersonales"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      {{ "PROYECTOS_PERSONALES_NAVBAR" | translate }}
    </button>

    <button
      class="menu-item menu-text typography-open-sans font-weight-700"
      routerLink="/seguirAprendiendo"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      {{ "APRENDIENDO_NAVBAR" | translate }}
    </button>

    <div class="menu-border" #border></div>
  </div>

  <div class="svg-container">

        />

</div>
